<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的音乐图文页</title>
    <style>
        /* 这里是CSS样式，你可以自由修改颜色、大小等来美化页面 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f9f3e6 0%, #fff5e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            padding: 2rem 1.8rem 2.2rem;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c06c3c, #a0522d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #86644b;
            border-left: 3px solid #e6b17e;
            padding-left: 1rem;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0.85;
        }

        .text-content {
            background: #fefaf5;
            padding: 1.5rem 1.4rem;
            border-radius: 1.75rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid #fff3e9;
        }

        .text-content p {
            font-size: 1rem;
            line-height: 1.55;
            color: #2e241f;
            margin-bottom: 1rem;
        }

        .text-content p:last-child {
            margin-bottom: 0;
        }

        .music-player {
            background: #ffffff;
            border-radius: 1.8rem;
            padding: 1rem 1.2rem 1.2rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffe3d0;
        }

        .track-title {
            font-weight: 500;
            font-size: 0.9rem;
            color: #b35f2e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .track-title::before {
            content: "♪";
            font-size: 1.1rem;
        }

        audio {
            width: 100%;
            height: 44px;
            border-radius: 60px;
            outline: none;
        }

        audio::-webkit-media-controls-panel {
            background-color: #fcf5ed;
        }

        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #be9882;
            margin-top: 1.6rem;
            letter-spacing: 0.3px;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.5rem 1.2rem 1.8rem;
            }
            h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 重要说明：这里显示你想要展示的文字内容，你可以自由替换 -->
        <h1>✨ 午后 · 冥想时光</h1>
        <div class="sub">—— 让文字与旋律一同呼吸</div>

        <div class="text-content">
            <p>翻看旧照片的时候，常常发现那些让人心头一动的瞬间，其实都与“慢”有关。<br>一杯温热的茶，窗边漏进来的光，耳机里循环的一首老歌。</p>
            <p>没有什么必须赶的路，也没有什么非解决不可的难题。<br>此刻，你只需要安静地读几行字，然后闭上眼，让这段音乐带你回到最放松的角落。</p>
            <p>生活偶尔需要这样的留白，<br>让文字和声音，一起温柔地托住你。</p>
        </div>

        <div class="music-player">
            <div class="track-title">🎵 推荐单曲 · 放松旋律</div>
            <!-- 音频播放器 controls属性会自动显示播放/暂停按钮和进度条 你只需修改 src 里的音乐文件链接 -->
            <audio controls preload="metadata">
                <!-- 请将下方 src 地址替换成你的音乐链接 -->
                <!-- 建议使用 .mp3 .m4a 等主流格式 -->
                <source src="颜人中 - 我只能离开.mp3" type="audio/mpeg">
                您的浏览器不支持 audio 标签，无法播放音乐。
            </audio>
            <div class="footer-note">
                🌿 点击播放按钮 · 享受此刻宁静
            </div>
        </div>
    </div>

    <!-- 可选的极简 JavaScript，目前仅用于页面标题装饰效果 -->
    <script>
        // 极简交互，未来可扩展更多播放器功能
        (function() {
            // 仅用于让控制台不报错，和预留扩展入口
            console.log("页面已加载 · 文字与音乐页面正常展示");
        })();
    </script>
</body>
</html>
